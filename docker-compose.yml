version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: clanker_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: clanker_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  web:
    build: .
    container_name: clanker_web
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app
      - POSTGRES_PORT=5432
      - SECRET_KEY=e9ca04470d046f254b7c4d5cd01b5c404cfdfc6a3df7bfde12687c4f42813134
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - REDIS_URL=redis://redis:6379/0
      - EXPORT_TEMP_DIR=/tmp/clanker_exports
    depends_on:
      - db
      - redis
    volumes:
      - export_tmp:/tmp/clanker_exports

  celery_worker:
    build: .
    container_name: clanker_celery_worker
    restart: always
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 -Q celery
    environment:
      - ENVIRONMENT=production
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app
      - POSTGRES_PORT=5432
      - SECRET_KEY=e9ca04470d046f254b7c4d5cd01b5c404cfdfc6a3df7bfde12687c4f42813134
      - REDIS_URL=redis://redis:6379/0
      - EXPORT_TEMP_DIR=/tmp/clanker_exports
    depends_on:
      - db
      - redis
    volumes:
      - export_tmp:/tmp/clanker_exports

  celery_flower:
    image: mher/flower:2.0
    container_name: clanker_flower
    restart: always
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
    depends_on:
      - redis
      - celery_worker
    command: celery flower --broker=redis://redis:6379/0 --port=5555

volumes:
  postgres_data:
  redis_data:
  export_tmp:
